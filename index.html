<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>중국어 문장 암기</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">
        <h1>📚 중국어 문장 암기</h1>
        <p>반복 듣기 · 병음 보기 · 쉐도잉</p>
    </div>

    <div class="card">

        <div id="sentence" class="sentence"></div>

        <div id="pinyin" class="pinyin"></div>

        <div id="meaning" class="meaning"></div>

        <div class="button-group">

            <button onclick="speakSentence()">
                🔊 듣기
            </button>

            <button onclick="nextSentence()">
                다음 문장
            </button>

            <button onclick="togglePinyin()">
                병음 보기/숨기기
            </button>

            <button onclick="randomSentence()">
                랜덤
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
