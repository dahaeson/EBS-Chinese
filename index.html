<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중국어 문장 암기</title>

    <link rel="stylesheet" href="style.css">

    <!-- XLSX 업로드용 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>📚 중국어 문장 암기</h1>
        <p>문장 · 병음 · 뜻 · TTS 학습</p>
    </div>

    <!-- 학습 카드 -->
    <div class="card">

        <div id="sentence" class="sentence"></div>

        <div id="pinyin" class="pinyin"></div>

        <div id="meaning" class="meaning"></div>

        <div class="button-group">

            <button onclick="speakSentence()">
                🔊 듣기
            </button>

            <button onclick="nextSentence()">
                다음 문장
            </button>

            <button onclick="togglePinyin()">
                병음 보기/숨기기
            </button>

            <button onclick="randomSentence()">
                🎲 랜덤
            </button>

            <button onclick="toggleCurrentFavorite()">
                ⭐ 즐겨찾기
            </button>

        </div>

    </div>

    <!-- 문장 추가 -->
    <div class="card">

        <h2>✏️ 문장 추가</h2>

        <input
            type="text"
            id="newChinese"
            placeholder="중국어 문장">

        <input
            type="text"
            id="newPinyin"
            placeholder="병음">

        <input
            type="text"
            id="newKorean"
            placeholder="한국어 뜻">

        <button onclick="addSentence()">
            문장 저장
        </button>

    </div>

    <!-- 검색 -->
    <div class="card">

        <h2>🔍 문장 검색</h2>

        <input
            type="text"
            id="searchInput"
            placeholder="중국어 또는 뜻 검색">

        <button onclick="searchSentences()">
            검색
        </button>

        <button onclick="renderSentenceList()">
            전체 보기
        </button>

        <button onclick="showFavorites()">
            ⭐ 즐겨찾기만 보기
        </button>

    </div>

    <!-- CSV 업로드 -->
    <div class="card">

        <h2>📂 CSV 업로드</h2>

        <p class="guide">
            형식 : 중국어,병음,뜻
        </p>

        <input
            type="file"
            id="csvFile"
            accept=".csv">

        <button onclick="importCSV()">
            CSV 가져오기
        </button>

    </div>

    <!-- XLSX 업로드 -->
    <div class="card">

        <h2>📊 엑셀(XLSX) 업로드</h2>

        <input
            type="file"
            id="excelFile"
            accept=".xlsx">

        <button onclick="importExcel()">
            엑셀 가져오기
        </button>

    </div>

    <!-- 저장 문장 목록 -->
    <div class="card">

        <div class="list-header">

            <h2>
                📖 저장된 문장
            </h2>

            <button
                class="danger"
                onclick="deleteAllSentences()">

                전체 삭제

            </button>

        </div>

        <div id="sentenceList">

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
