<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>중국어 문장 암기</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

.controls{
    margin:10px 0;
}

button{
    padding:8px 15px;
    margin:3px;
    cursor:pointer;
}

.card{
    border:1px solid #ccc;
    border-radius:10px;
    padding:20px;
    margin-top:20px;
}

.cn{
    font-size:32px;
    color:#d63031;
    margin-bottom:15px;
}

.kr{
    font-size:22px;
    color:#2d3436;
}

.hidden{
    visibility:hidden;
}

textarea{
    width:100%;
    height:150px;
}

.date-box{
    margin-bottom:10px;
}

.info{
    margin-top:10px;
    color:#666;
}
</style>
</head>
<body>

<h1>중국어 문장 암기장</h1>

<div class="date-box">
    날짜 :
    <input type="date" id="studyDate">
</div>

<textarea id="sentenceInput"
placeholder="형식:

你好｜안녕하세요
你吃饭了吗？｜밥 먹었어요?
今天很忙。｜오늘 매우 바빠요
"></textarea>

<br>
<button onclick="saveData()">저장</button>
<button onclick="loadData()">불러오기</button>

<hr>

<div class="controls">
    <button onclick="prevSentence()">◀ 이전</button>
    <button onclick="nextSentence()">다음 ▶</button>
    <button onclick="randomSentence()">🎲 문장뽑기</button>
</div>

<div class="controls">
    <button onclick="toggleChinese()">중국어 가리기</button>
    <button onclick="toggleKorean()">한국어 가리기</button>
    <button onclick="speakChinese()">🔊 발음</button>
</div>

<div class="card">

    <div class="cn" id="cnText"></div>

    <div class="kr" id="krText"></div>

</div>

<div class="info" id="counter"></div>

<script>

let sentences=[];
let currentIndex=0;

function saveData(){

    const date=document.getElementById("studyDate").value;

    if(!date){
        alert("날짜를 선택하세요.");
        return;
    }

    localStorage.setItem(
        "study_"+date,
        document.getElementById("sentenceInput").value
    );

    alert("저장 완료");
}

function loadData(){

    const date=document.getElementById("studyDate").value;

    const data=localStorage.getItem("study_"+date);

    if(!data){
        alert("저장된 데이터 없음");
        return;
    }

    document.getElementById("sentenceInput").value=data;

    parseSentences();
}

function parseSentences(){

    const lines=
        document.getElementById("sentenceInput")
        .value
        .split("\n")
        .filter(v=>v.trim()!="");

    sentences=[];

    lines.forEach(line=>{

        const arr=line.split("|");

        if(arr.length>=2){

            sentences.push({
                cn:arr[0].trim(),
                kr:arr[1].trim()
            });

        }

    });

    currentIndex=0;

    showSentence();
}

function showSentence(){

    if(sentences.length===0){

        parseSentences();

        if(sentences.length===0){
            return;
        }
    }

    document.getElementById("cnText").textContent=
        sentences[currentIndex].cn;

    document.getElementById("krText").textContent=
        sentences[currentIndex].kr;

    document.getElementById("counter").innerHTML=
        (currentIndex+1)+" / "+sentences.length;
}

function nextSentence(){

    if(sentences.length===0){
        parseSentences();
    }

    currentIndex++;

    if(currentIndex>=sentences.length){
        currentIndex=0;
    }

    showSentence();
}

function prevSentence(){

    if(sentences.length===0){
        parseSentences();
    }

    currentIndex--;

    if(currentIndex<0){
        currentIndex=sentences.length-1;
    }

    showSentence();
}

function randomSentence(){

    if(sentences.length===0){
        parseSentences();
    }

    currentIndex=
        Math.floor(Math.random()*sentences.length);

    showSentence();
}

function toggleChinese(){

    document
    .getElementById("cnText")
    .classList.toggle("hidden");
}

function toggleKorean(){

    document
    .getElementById("krText")
    .classList.toggle("hidden");
}

function speakChinese(){

    if(sentences.length===0){
        parseSentences();
    }

    const text=sentences[currentIndex].cn;

    const utterance=
        new SpeechSynthesisUtterance(text);

    utterance.lang="zh-CN";
    utterance.rate=0.9;

    const voices=
        speechSynthesis.getVoices();

    const chineseVoice=
        voices.find(v=>v.lang.includes("zh"));

    if(chineseVoice){
        utterance.voice=chineseVoice;
    }

    speechSynthesis.speak(utterance);
}

window.speechSynthesis.onvoiceschanged=()=>{
    speechSynthesis.getVoices();
};

</script>

</body>
</html>
